<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=Merriweather:opsz@18..144&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Клуб четырех коней</title>
</head>

<body>
    <div class="welcome-bg">
        <header>
            <a href="/" class="logo" aria-label="Клуб четырёх коней">
                <img src="public/knight_minified.svg" />
                <img src="public/knight_minified.svg" />
                <img src="public/knight_minified.svg" />
                <img src="public/knight_minified.svg" />
            </a>
        </header>
        <main>
            <section class="welcome">
                <div class="welcome-content">
                    <h1 class="welcome-title">
                        Превратите уездный город <span class="line--center">в столицу</span> <span
                            class="line--right">земного шара</span>
                    </h1>

                    <p class="welcome-description">
                        Оплатите взнос на телеграммы для организации Международного васюкинского турнира по шахматам
                    </p>
                    <button type="button" class="welcome-button">Поддержать шахматную мысль</button>
                    <button type="button" class="welcome-button--secondary">Подробнее о турнире</button>
                </div>

                <img src="public/pawn.png" />
                <img src="public/knight.png" />
                <img src="public/queen.png" />
                <img src="public/king.png" />
            </section>
        </main>
    </div>

    <footer></footer>

</body>

</html>
