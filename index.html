<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900;&family=Merriweather:opsz@18..144&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Клуб четырёх коней</title>
</head>

<body>
    <div class="welcome-bg">
        <header class="header">
            <div class="container">
                <div class="header-content">
                    <a href="/" class="logo" aria-label="Клуб четырёх коней">
                        <img src="public/knight_minified.svg" />
                        <img src="public/knight_minified.svg" />
                        <img src="public/knight_minified.svg" />
                        <img src="public/knight_minified.svg" />
                    </a>
                    <p class="header-description">клуб<span class="line--left">четырех коней</span></p>
                </div>
            </div>
        </header>
        <main>
            <section class="welcome">
                <div class="container">
                    <div class="welcome-content">
                        <h1 class="welcome-title"><span class="line--left">
                                Превратите <span class="line--left"></span>уездный город</span>
                            </span>
                            <span class="line--center">в столицу</span> <span class="line--right">земного шара</span>
                        </h1>

                        <p class="welcome-description">
                            Оплатите взнос на телеграммы для организации Международного васюкинского турнира по шахматам
                        </p>
                        <div class="welcome-buttons">
                            <button type="button" class="welcome-button">Поддержать шахматную мысль</button>
                            <button type="button" class="welcome-button--secondary">Подробнее о турнире</button>
                        </div>
                    </div>

                    <img src="public/pawn.png" />
                    <img src="public/knight.png" />
                    <img src="public/queen.png" />
                    <img src="public/king.png" />
                </div>
            </section>
        </main>
    </div>

    <footer></footer>

</body>

</html>
